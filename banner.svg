<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fundo -->
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#03040A"/>
      <stop offset="30%" stop-color="#0D0620"/>
      <stop offset="65%" stop-color="#2B0A4D"/>
      <stop offset="100%" stop-color="#7B2CFB"/>
    </linearGradient>

    <!-- Glow -->
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(860 70) rotate(90) scale(180 320)">
      <stop stop-color="#C084FC" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 200) rotate(90) scale(150 270)">
      <stop stop-color="#7C3AED" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="waveFade" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.03"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Fundo -->
  <rect width="1000" height="260" fill="url(#bg)"/>

  <!-- Glow animado -->
  <ellipse cx="860" cy="70" rx="280" ry="140" fill="url(#glow1)">
    <animate attributeName="cx" values="860;830;860" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="180" cy="200" rx="220" ry="120" fill="url(#glow2)">
    <animate attributeName="cx" values="180;220;180" dur="10s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Linhas verticais -->
  <g opacity="0.08">
    <rect x="20" y="0" width="1" height="260" fill="#C4B5FD"/>
    <rect x="35" y="0" width="1" height="260" fill="#C4B5FD"/>
    <rect x="50" y="0" width="1" height="260" fill="#C4B5FD"/>
    <rect x="65" y="0" width="1" height="260" fill="#C4B5FD"/>
    <rect x="80" y="0" width="1" height="260" fill="#C4B5FD"/>
    <rect x="95" y="0" width="1" height="260" fill="#C4B5FD"/>
    <rect x="110" y="0" width="1" height="260" fill="#C4B5FD"/>
    <rect x="125" y="0" width="1" height="260" fill="#C4B5FD"/>
    <rect x="140" y="0" width="1" height="260" fill="#C4B5FD"/>
    <rect x="155" y="0" width="1" height="260" fill="#C4B5FD"/>
    <rect x="170" y="0" width="1" height="260" fill="#C4B5FD"/>
    <rect x="185" y="0" width="1" height="260" fill="#C4B5FD"/>
    <rect x="200" y="0" width="1" height="260" fill="#C4B5FD"/>
  </g>

  <!-- Onda principal -->
  <path d="M0 190 C180 150, 340 230, 520 195 C720 155, 850 220, 1000 180 L1000 260 L0 260 Z"
        fill="url(#waveFade)">
    <animate attributeName="d"
      dur="8s"
      repeatCount="indefinite"
      values="
      M0 190 C180 150, 340 230, 520 195 C720 155, 850 220, 1000 180 L1000 260 L0 260 Z;
      M0 180 C200 135, 360 240, 530 205 C740 160, 860 210, 1000 170 L1000 260 L0 260 Z;
      M0 190 C180 150, 340 230, 520 195 C720 155, 850 220, 1000 180 L1000 260 L0 260 Z
      "/>
  </path>

  <!-- Linha de onda -->
  <path d="M0 200 C180 170, 330 240, 520 210 C700 180, 860 225, 1000 190"
        stroke="#E9D5FF"
        stroke-opacity="0.18"
        stroke-width="2"
        fill="none">
    <animate attributeName="d"
      dur="6s"
      repeatCount="indefinite"
      values="
      M0 200 C180 170, 330 240, 520 210 C700 180, 860 225, 1000 190;
      M0 190 C170 155, 350 245, 530 215 C710 175, 850 220, 1000 180;
      M0 200 C180 170, 330 240, 520 210 C700 180, 860 225, 1000 190
      "/>
  </path>

  <!-- TEXTO DENTRO DO BANNER -->
  <text x="500" y="95"
        text-anchor="middle"
        fill="white"
        font-size="52"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700">
    TsukiKazo
  </text>

  <text x="500" y="145"
        text-anchor="middle"
        fill="white"
        font-size="22"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="600">
    Full Stack Developer | Automation | Integrations | AI
  </text>
</svg>
