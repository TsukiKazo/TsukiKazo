<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#02030A"/>
      <stop offset="35%" stop-color="#0F0621"/>
      <stop offset="70%" stop-color="#2B0A4D"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 80) rotate(90) scale(160 340)">
      <stop stop-color="#C084FC" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 260) rotate(90) scale(120 260)">
      <stop stop-color="#8B5CF6" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fundo -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Brilhos -->
  <ellipse cx="1040" cy="80" rx="320" ry="150" fill="url(#glowRight)">
    <animate attributeName="cx" values="1040;1010;1040" dur="10s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="180" cy="260" rx="230" ry="120" fill="url(#glowLeft)">
    <animate attributeName="cx" values="180;220;180" dur="12s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Linhas -->
  <g opacity="0.08">
    <rect x="30" y="0" width="1" height="320" fill="#D8B4FE"/>
    <rect x="50" y="0" width="1" height="320" fill="#D8B4FE"/>
    <rect x="70" y="0" width="1" height="320" fill="#D8B4FE"/>
    <rect x="90" y="0" width="1" height="320" fill="#D8B4FE"/>
    <rect x="110" y="0" width="1" height="320" fill="#D8B4FE"/>
    <rect x="130" y="0" width="1" height="320" fill="#D8B4FE"/>
    <rect x="150" y="0" width="1" height="320" fill="#D8B4FE"/>
    <rect x="170" y="0" width="1" height="320" fill="#D8B4FE"/>
    <rect x="190" y="0" width="1" height="320" fill="#D8B4FE"/>
    <rect x="210" y="0" width="1" height="320" fill="#D8B4FE"/>
  </g>

  <!-- Onda fundo -->
  <path fill="rgba(255,255,255,0.06)">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="
      M0,230 C200,180 360,270 620,230 C860,190 1080,250 1280,210 L1280,320 L0,320 Z;
      M0,220 C240,170 390,280 650,240 C910,190 1090,245 1280,200 L1280,320 L0,320 Z;
      M0,230 C200,180 360,270 620,230 C860,190 1080,250 1280,210 L1280,320 L0,320 Z
      " />
  </path>

  <!-- Onda linha -->
  <path stroke="#E9D5FF" stroke-opacity="0.18" stroke-width="2" fill="none">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
      values="
      M0,240 C220,200 390,280 650,245 C900,210 1090,255 1280,220;
      M0,230 C240,185 400,290 660,250 C920,205 1100,245 1280,210;
      M0,240 C220,200 390,280 650,245 C900,210 1090,255 1280,220
      " />
  </path>

  <!-- Texto -->
  <text x="640" y="115"
        text-anchor="middle"
        fill="white"
        font-size="54"
        font-family="Segoe UI, Arial, sans-serif"
        font-weight="700">
    TsukiKazo
  </text>

  <text x="640" y="165"
        text-anchor="middle"
        fill="white"
        font-size="24"
        font-family="Segoe UI, Arial, sans-serif"
        font-weight="600">
    Full Stack Developer | Automation | Integrations | AI
  </text>
</svg>
